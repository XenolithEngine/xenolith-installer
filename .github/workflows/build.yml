name: Build installers

# Cross-platform desktop bundles + self-update artifacts.
#  * push a tag `vX.Y.Z`  -> builds all platforms, signs the updater artifacts,
#    and attaches them (+ latest.json + the CLI binaries) to a draft GitHub
#    Release for that tag. Review the draft, then PUBLISH it: the updater reads
#    `releases/latest/download/latest.json`, which only resolves to a published
#    (non-draft, non-prerelease) release.
# Requires repo secrets TAURI_SIGNING_PRIVATE_KEY (+ _PASSWORD) — see docs/RELEASING.md.
#  * run manually         -> builds all platforms, artifacts attached to the run.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  bundle:
    name: ${{ matrix.label }}
    permissions:
      contents: write # needed to create/update the release on a tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (universal)
            args: "--target universal-apple-darwin"
          - os: ubuntu-22.04
            label: Linux (x86_64)
            args: ""
          - os: windows-latest
            label: Windows (x86_64)
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file

      # Build the frontend explicitly here. tauri-action's npm CLI runs the
      # config's beforeBuildCommand from the wrong dir on CI, so we pre-build the
      # SPA and disable beforeBuildCommand via tauri.ci.json below.
      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        working-directory: ui

      - name: Load release notes
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<RELEASE_NOTES_EOF'
            cat RELEASE_NOTES.md
            echo RELEASE_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build app bundles (signed updater artifacts)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts + latest.json with the minisign key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/gui
          # `-c tauri.ci.json` merges over tauri.conf.json to disable the
          # beforeBuildCommand (the frontend is already built in the step above).
          args: ${{ matrix.args }} -c tauri.ci.json
          # On a tag push, publish to a draft release; otherwise just build.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Xenolith Installer {0}', github.ref_name) || '' }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false

      - name: Upload bundles as run artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: xenolith-installer-${{ matrix.os }}
          path: |
            target/**/release/bundle/**/*.dmg
            target/**/release/bundle/**/*.app
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
          if-no-files-found: warn

      # ---- headless CLI: standalone binary for `xenolith-installer self-update` ----
      # `self_update` matches the release asset whose name contains the host target
      # triple, so each tarball is named `xenolith-installer-<triple>.tar.gz`.
      - name: Build & package CLI
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.os }}" in
            macos-latest)   TARGETS="aarch64-apple-darwin x86_64-apple-darwin" ;;
            ubuntu-22.04)   TARGETS="x86_64-unknown-linux-gnu" ;;
            windows-latest) TARGETS="x86_64-pc-windows-msvc" ;;
          esac
          mkdir -p dist-cli
          for T in $TARGETS; do
            rustup target add "$T"
            cargo build -p xenolith-installer-cli --release --target "$T"
            EXT=""; [[ "$T" == *windows* ]] && EXT=".exe"
            tar -C "target/$T/release" -czf "dist-cli/xenolith-installer-$T.tar.gz" "xenolith-installer${EXT}"
          done

      - name: Upload CLI to release (tag)
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist-cli/* --clobber

      - name: Upload CLI as run artifacts (non-tag)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: xenolith-cli-${{ matrix.os }}
          path: dist-cli/*
          if-no-files-found: warn

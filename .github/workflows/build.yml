name: Build installers

# Cross-platform desktop bundles + self-update artifacts.
#  * push a tag `vX.Y.Z`  -> a single draft release is created up front, then all
#    platforms build in parallel and upload their signed bundles (+ latest.json +
#    the CLI binaries) into that one release. Review the draft, then PUBLISH it:
#    the updater reads `releases/latest/download/latest.json`, which only resolves
#    to a published (non-draft, non-prerelease) release.
#  * run manually         -> builds all platforms, artifacts attached to the run.
#
# The draft is created by a dedicated `create-release` job (not by the matrix) so
# parallel jobs don't race to create their own release — which produced duplicate
# drafts with the assets split across them.
# Requires repo secrets TAURI_SIGNING_PRIVATE_KEY (+ _PASSWORD) — see docs/RELEASING.md.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create exactly ONE draft release (tag pushes only) and hand its id to the
  # matrix. Idempotent: any pre-existing release for this tag is deleted first so
  # re-runs (e.g. a moved tag) don't pile up duplicate drafts.
  create-release:
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Load release notes
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<RELEASE_NOTES_EOF'
            cat RELEASE_NOTES.md
            echo RELEASE_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          BODY: ${{ steps.notes.outputs.body }}
        run: |
          set -euo pipefail
          # Drop any release already pointing at this tag (draft or not).
          for id in $(gh api "repos/$GITHUB_REPOSITORY/releases" \
              --jq ".[] | select(.tag_name==\"$TAG\") | .id"); do
            echo "deleting pre-existing release $id"
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$id"
          done
          rid=$(gh api --method POST "repos/$GITHUB_REPOSITORY/releases" \
            -f tag_name="$TAG" \
            -f name="Xenolith Installer $TAG" \
            -f body="$BODY" \
            -F draft=true \
            -F prerelease=false \
            --jq '.id')
          echo "release_id=$rid" >> "$GITHUB_OUTPUT"
          echo "created draft release $rid for $TAG"

  bundle:
    name: ${{ matrix.label }}
    needs: create-release
    # Run even when create-release was skipped (manual, non-tag runs); skip only
    # if release creation actually failed.
    if: ${{ always() && needs.create-release.result != 'failure' }}
    permissions:
      contents: write # upload bundles + CLI to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (universal)
            args: "--target universal-apple-darwin"
          - os: ubuntu-22.04
            label: Linux (x86_64)
            args: ""
          - os: windows-latest
            label: Windows (x86_64)
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file

      # Build the frontend explicitly here. tauri-action's npm CLI runs the
      # config's beforeBuildCommand from the wrong dir on CI, so we pre-build the
      # SPA and disable beforeBuildCommand via tauri.ci.json below.
      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        working-directory: ui

      - name: Build app bundles (signed updater artifacts)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts + latest.json with the minisign key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/gui
          # `-c tauri.ci.json` merges over tauri.conf.json to disable the
          # beforeBuildCommand (the frontend is already built in the step above).
          args: ${{ matrix.args }} -c tauri.ci.json
          # Upload into the single draft created by `create-release` (empty on
          # non-tag runs → tauri-action just builds, no upload).
          releaseId: ${{ needs.create-release.outputs.release_id }}

      - name: Upload bundles as run artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: xenolith-installer-${{ matrix.os }}
          path: |
            target/**/release/bundle/**/*.dmg
            target/**/release/bundle/**/*.app
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
          if-no-files-found: warn

      # ---- headless CLI: standalone binary for `xenolith-installer self-update` ----
      # `self_update` matches the release asset whose name contains the host target
      # triple, so each tarball is named `xenolith-installer-<triple>.tar.gz`.
      - name: Build & package CLI
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.os }}" in
            macos-latest)   TARGETS="aarch64-apple-darwin x86_64-apple-darwin" ;;
            ubuntu-22.04)   TARGETS="x86_64-unknown-linux-gnu" ;;
            windows-latest) TARGETS="x86_64-pc-windows-msvc" ;;
          esac
          mkdir -p dist-cli
          for T in $TARGETS; do
            rustup target add "$T"
            cargo build -p xenolith-installer-cli --release --target "$T"
            EXT=""; [[ "$T" == *windows* ]] && EXT=".exe"
            tar -C "target/$T/release" -czf "dist-cli/xenolith-installer-$T.tar.gz" "xenolith-installer${EXT}"
          done

      - name: Upload CLI to the release (tag)
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          set -euo pipefail
          up="https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets"
          for f in dist-cli/*; do
            name=$(basename "$f")
            echo "uploading $name"
            gh api --method POST "$up?name=$name" \
              -H "Content-Type: application/gzip" \
              --input "$f" >/dev/null
          done

      - name: Upload CLI as run artifacts (non-tag)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: xenolith-cli-${{ matrix.os }}
          path: dist-cli/*
          if-no-files-found: warn
